databases:
  - name: smartskin-db
    region: frankfurt
    plan: basic-256mb
    postgresMajorVersion: "16"

services:
  - type: web
    name: smartskin-app
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm ci && npm run build && npx prisma migrate deploy
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smartskin-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: GOOGLE_CLOUD_PROJECT
        sync: false
      - key: GOOGLE_CLOUD_LOCATION
        value: europe-west1
