<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F1F3F6; --ink:#1A1D21; --card:#FFFFFF;
    --cloud:#EDEFF7; --space:#9DA2B3; --graphite:#6E7180;
    --accent:#A6C3D6; --accent-d:#7FA6BE; --accent-bg:rgba(166,195,214,0.16);
    --keep:#3A8F6F;
    --fd:'Manrope',system-ui,sans-serif;
  }
  *{ box-sizing:border-box; }
  body{ margin:0; background:#dfe2ea; font-family:var(--fd);
        display:flex; gap:34px; padding:46px; align-items:flex-start; }
  .col{ display:flex; flex-direction:column; align-items:center; gap:14px; }
  .cap{ font-size:14px; font-weight:700; color:#3a3d47; letter-spacing:-0.01em; }
  .cap small{ display:block; font-weight:500; color:#888c98; font-size:12px; margin-top:2px; }
  .phone{ position:relative; width:360px; height:760px; border-radius:42px; overflow:hidden;
          background:var(--bg); box-shadow:0 18px 50px rgba(30,34,50,0.22), 0 0 0 1px rgba(0,0,0,0.04); }

  /* ===== NEW (.gen, copié tel quel depuis routine-v2.css) ===== */
  .gen-stack{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 50px; }
  .gen-ring{ width:64px; height:64px; border-radius:50%; border:3px solid rgba(127,166,190,0.22); border-top-color:var(--accent-d); display:flex; align-items:center; justify-content:center; color:#fff; }
  .gen-ring.spin{ animation:introSpin .7s linear infinite; }
  .gen-ring .gen-check{ width:30px; height:30px; display:flex; opacity:0; transform:scale(.4); }
  .gen-ring .gen-check svg{ width:100%; height:100%; }
  .gen-ring.done{ border:none; background:var(--keep); box-shadow:0 8px 24px rgba(58,143,111,0.38); }
  .gen-ring.done .gen-check{ opacity:1; transform:none; }
  .gen-title{ margin-top:26px; text-align:center; font-weight:800; font-size:22px; letter-spacing:-0.035em; color:var(--ink); }
  .gen-bar{ width:100%; max-width:220px; height:4px; border-radius:100px; background:rgba(26,29,33,0.07); overflow:hidden; margin-top:24px; }
  .gen-bar i{ display:block; height:100%; border-radius:100px; background:linear-gradient(90deg,var(--accent),var(--accent-d)); }
  .gen-ring.done ~ .gen-bar i{ background:var(--keep); }
  @keyframes introSpin{ to{ transform:rotate(360deg); } }

  /* ===== OLD (état d'avant — reproduit ton screenshot) ===== */
  .gen-stack-old{ position:absolute; top:300px; left:0; right:0; display:flex; flex-direction:column; align-items:center; padding:0 50px; }
  .gen-ring-old{ width:54px; height:54px; border-radius:50%; border:3px solid var(--keep); }
  .gen-title-old{ margin-top:24px; text-align:center; font-weight:800; font-size:21px; letter-spacing:-0.035em; color:var(--ink); }
  .gen-bar-old{ width:100%; max-width:230px; height:3px; border-radius:100px; background:rgba(26,29,33,0.08); overflow:hidden; margin-top:22px; }
  .gen-bar-old i{ display:block; height:100%; width:100%; border-radius:100px; background:linear-gradient(90deg,var(--accent),var(--accent-d)); }
</style>
</head>
<body>
  <div class="col">
    <div class="cap">Avant<small>ton screenshot</small></div>
    <div class="phone">
      <div class="gen-stack-old">
        <div class="gen-ring-old"></div>
        <div class="gen-title-old">Your protocol is ready.</div>
        <div class="gen-bar-old"><i></i></div>
      </div>
    </div>
  </div>

  <div class="col">
    <div class="cap">Après · chargement<small>pendant l'assemblage (~2 s)</small></div>
    <div class="phone">
      <div class="gen-stack">
        <div class="gen-ring spin">
          <span class="gen-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.5 4.5L19 7"/></svg></span>
        </div>
        <div class="gen-title">Assembling your protocol…</div>
        <div class="gen-bar"><i style="width:62%"></i></div>
      </div>
    </div>
  </div>

  <div class="col">
    <div class="cap">Après · prêt<small>nouvel état « ready »</small></div>
    <div class="phone">
      <div class="gen-stack">
        <div class="gen-ring done">
          <span class="gen-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.5 4.5L19 7"/></svg></span>
        </div>
        <div class="gen-title">Your protocol is ready.</div>
        <div class="gen-bar"><i style="width:100%"></i></div>
      </div>
    </div>
  </div>
</body>
</html>
