<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartSkin AI — Sécurité</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#F1F3F6; --ink:#1A1D21; --card:#FFFFFF; --cloud:#EDEFF7; --smoke:#D3D6E0; --steel:#BCBFCC;
  --space:#9DA2B3; --graphite:#6E7180; --arsenic:#40424D;
  --fd:'Manrope',sans-serif; --fm:'JetBrains Mono',monospace;
}
html, body { background:#DEE0E5; display:flex; justify-content:center; align-items:flex-start;
  min-height:100vh; padding:48px 16px 80px; font-family:var(--fd); -webkit-font-smoothing:antialiased; }
.phone { width:430px; background:var(--bg); border-radius:52px; overflow:hidden;
  box-shadow:0 0 0 1px rgba(0,0,0,0.07),0 4px 8px rgba(0,0,0,0.05),0 32px 80px rgba(0,0,0,0.18),0 12px 32px rgba(0,0,0,0.09); }
.screen { height:932px; display:flex; flex-direction:column; background:var(--bg); }
.brand { display:flex; align-items:center; justify-content:center; padding:30px 24px 0; animation:rise .5s cubic-bezier(.22,1,.36,1) both .02s; }
.brand img { height:26px; width:auto; display:block; }
.topbar { padding:20px 24px 0; display:flex; align-items:center; gap:14px; animation:rise .5s cubic-bezier(.22,1,.36,1) both .05s; }
.back { width:40px; height:40px; border-radius:50%; background:var(--card); border:1px solid rgba(0,0,0,0.05); box-shadow:0 1px 5px rgba(0,0,0,0.06); display:flex; align-items:center; justify-content:center; color:var(--ink); cursor:pointer; flex-shrink:0; }
.prog { flex:1; height:5px; background:var(--cloud); border-radius:100px; overflow:hidden; }
.prog-fill { height:100%; width:100%; background:var(--ink); border-radius:100px; animation:grow .9s cubic-bezier(.22,1,.36,1) both .2s; }
@keyframes grow { from{width:0;} to{width:100%;} }
.prog-step { font-family:var(--fm); font-size:10px; color:var(--space); letter-spacing:0.08em; flex-shrink:0; }
.qhead { padding:26px 26px 14px; animation:rise .55s cubic-bezier(.22,1,.36,1) both .12s; }
.question { font-weight:800; font-size:28px; line-height:1.1; letter-spacing:-0.035em; color:var(--ink); }
.helper { font-weight:400; font-size:12.5px; color:var(--graphite); margin-top:11px; line-height:1.4; }
.helper svg { color:var(--graphite); vertical-align:-2px; margin-right:6px; }
.helper b { color:var(--ink); font-weight:700; }
.list { flex:1; overflow-y:auto; padding:6px 22px 12px; scrollbar-width:none; display:flex; flex-direction:column; gap:10px; align-content:start; }
.list::-webkit-scrollbar { display:none; }
.opt {
  position:relative; display:flex; flex-direction:row; align-items:center; gap:14px;
  background:var(--card); border:1.5px solid rgba(26,29,33,0.07); border-radius:18px;
  padding:15px 48px 15px 15px; cursor:pointer; -webkit-tap-highlight-color:transparent;
  transition:background .22s, border-color .22s, transform .15s, box-shadow .22s, opacity .22s;
  animation:rise .5s cubic-bezier(.22,1,.36,1) both;
}
.opt:active { transform:scale(0.99); }
.opt-ic { width:46px; height:46px; border-radius:13px; background:var(--cloud); display:flex; align-items:center; justify-content:center; color:var(--graphite); flex-shrink:0; transition:background .22s, color .22s; }
.opt-tx { min-width:0; }
.opt-l { font-weight:700; font-size:15px; color:var(--ink); letter-spacing:-0.025em; line-height:1.12; transition:color .22s; }
.opt-s { font-size:11.5px; color:var(--space); margin-top:3px; line-height:1.25; transition:color .22s; }
.opt-radio { position:absolute; top:50%; right:15px; transform:translateY(-50%); width:24px; height:24px; border-radius:50%; border:1.8px solid var(--smoke);
  display:flex; align-items:center; justify-content:center; color:transparent; transition:all .22s cubic-bezier(.34,1.56,.64,1); }
.opt.sel { background:var(--ink); border-color:var(--ink); box-shadow:0 10px 26px rgba(26,29,33,0.24); }
.opt.sel .opt-l { color:#fff; }
.opt.sel .opt-s { color:rgba(255,255,255,0.55); }
.opt.sel .opt-ic { background:rgba(255,255,255,0.13); color:#fff; }
.opt.sel .opt-radio { background:rgba(255,255,255,0.28); border-color:transparent; color:#fff; }
.footer { padding:14px 22px 30px; background:linear-gradient(to top, var(--bg) 74%, transparent); animation:rise .55s cubic-bezier(.22,1,.36,1) both .5s; }
.foot-row { display:flex; align-items:center; gap:14px; }
.cta-btn { flex:1; height:56px; background:var(--ink); color:#fff; font-weight:600; font-size:15px; letter-spacing:-0.01em; border:none; border-radius:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:9px; transition:opacity .2s, transform .18s; box-shadow:0 6px 18px rgba(26,29,33,0.22); }
.cta-btn:disabled { opacity:0.3; box-shadow:none; cursor:not-allowed; }
.cta-btn:not(:disabled):hover { transform:translateY(-2px); }
@keyframes rise { from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:none;} }
</style>
</head>
<body>
<div class="phone">
<div class="screen">

  <div class="brand"><img src="logo-smartskin.png" alt="SmartSkin AI"></div>

  <div class="topbar">
    <div class="back" onclick="location.href='q6.html'"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13L5 8l5-5"/></svg></div>
    <div class="prog"><div class="prog-fill"></div></div>
    <span class="prog-step">07 / 07</span>
  </div>

  <div class="qhead">
    <h1 class="question">Une situation à signaler ?</h1>
    <p class="helper">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="7" cy="7" r="5.5"/><path d="M7 9.5V6.5M7 4.6v.05" stroke-linecap="round"/></svg>
      Pour <b>écarter les actifs déconseillés</b> dans ton cas.
    </p>
  </div>

  <div class="list" id="list">

    <div class="opt" data-v="pregnancy" style="animation-delay:.16s">
      <div class="opt-ic"><svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="4.5" r="1.8"/><path d="M11 7v6a4 4 0 0 0 4 4M11 9c-2.5 0-4 1.6-4 4s1 5 1 5"/></svg></div>
      <div class="opt-tx"><div class="opt-l">Grossesse / allaitement</div><div class="opt-s">on évite rétinoïdes &amp; salicylique</div></div>
      <div class="opt-radio"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 6.3l2.3 2.3 4.7-5"/></svg></div>
    </div>

    <div class="opt" data-v="condition" style="animation-delay:.2s">
      <div class="opt-ic"><svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 19s-6.5-3.8-6.5-9A3.5 3.5 0 0 1 11 7a3.5 3.5 0 0 1 6.5 3c0 5.2-6.5 9-6.5 9Z"/><path d="M8.5 9h2l1 2 1-3.5 1 1.5h1.5" opacity=".6"/></svg></div>
      <div class="opt-tx"><div class="opt-l">Rosacée / eczéma</div><div class="opt-s">peau réactive diagnostiquée</div></div>
      <div class="opt-radio"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 6.3l2.3 2.3 4.7-5"/></svg></div>
    </div>

    <div class="opt" data-v="treatment" style="animation-delay:.24s">
      <div class="opt-ic"><svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="9" width="9" height="9" rx="4.5" transform="rotate(-45 8 13.5)"/><path d="M9 11l4 4"/></svg></div>
      <div class="opt-tx"><div class="opt-l">Traitement dermato en cours</div><div class="opt-s">prescription (Roaccutane, etc.)</div></div>
      <div class="opt-radio"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 6.3l2.3 2.3 4.7-5"/></svg></div>
    </div>

    <div class="opt" data-v="none" data-exclusive="1" style="animation-delay:.28s">
      <div class="opt-ic"><svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><path d="M11 3l6 2.5v4.5c0 4-2.6 6.7-6 8-3.4-1.3-6-4-6-8V5.5L11 3Z"/><path d="M8.5 11l1.8 1.8 3.4-3.6" stroke-linecap="round"/></svg></div>
      <div class="opt-tx"><div class="opt-l">Rien à signaler</div><div class="opt-s">aucune restriction</div></div>
      <div class="opt-radio"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 6.3l2.3 2.3 4.7-5"/></svg></div>
    </div>

  </div>

  <div class="footer">
    <div class="foot-row">
      <button class="cta-btn" id="cta" disabled onclick="location.href='analyse.html'">
        Lancer mon analyse
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h9M8 4l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>

</div>
</div>

<script>
(function(){
  var opts = Array.prototype.slice.call(document.querySelectorAll('.opt'));
  var cta = document.getElementById('cta');
  function refresh(){ cta.disabled = !opts.some(function(c){ return c.classList.contains('sel'); }); }
  opts.forEach(function(c){
    c.addEventListener('click', function(){
      var isExcl = !!c.dataset.exclusive;
      if (c.classList.contains('sel')) { c.classList.remove('sel'); refresh(); return; }
      if (isExcl) opts.forEach(function(o){ o.classList.remove('sel'); });
      else opts.forEach(function(o){ if (o.dataset.exclusive) o.classList.remove('sel'); });
      c.classList.add('sel'); refresh();
    });
  });
  refresh();
})();
</script>
</body>
</html>
